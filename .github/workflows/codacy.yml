engines:
  phpstan:
    enabled: true
    config: phpstan.yml
  phpcs:
    enabled: true
    config:
      file_extensions: "php"
      standard: "WordPress"
  duplication:
    enabled: true
    exclude_paths:
      - 'assets/**'
      - 'node_modules/**'
      - 'vendor/**'
  markdownlint:
    enabled: true

exclude_paths:
  - 'assets/css/**'
  - 'assets/js/**'
  - 'assets/img/**'
  - 'languages/**'
  - 'node_modules/**'
  - 'vendor/**'
  - '**/*.min.css'
  - '**/*.min.js'
  - '*.min.css'
  - '*.min.js'
  - 'README.md'
  - 'CHANGELOG.md'
  - 'LICENSE'

issues:
  exclude_paths:
    - 'README.md'
    - 'CHANGELOG.md'
    - '*.md'
